<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #f4f4f4; }
    .container { width: 100%; max-width: 500px; text-align: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 20px; color: #333; }
    .campo { margin-bottom: 15px; text-align: left; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .error { color: red; font-size: 13px; margin-top: 4px; }
    .acciones { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block; }
    .btn-guardar { background-color: #01415B; color: white; }
    .btn-volver { background-color: #6c757d; color: white; }
    .btn-eliminar { background-color: #dc3545; color: white; }
  </style>
</head>
<body>

<div class="container">
  <h1 th:text="${modoEdicion} ? 'Editar Pedido' : 'Nuevo Pedido'"></h1>

  <form th:action="${modoEdicion} ? @{/pedidos/actualizar/{id}(id=${pedido.idPedido})} : @{/pedidos/guardar}"
        th:object="${pedido}"
        method="post">

    <input type="hidden" th:field="*{idPedido}" th:if="${modoEdicion}">



    <div class="campo">
      <label for="fechaPedido">Fecha</label>
      <input type="date" id="fechaPedido" th:field="*{fechaPedido}">
      <div class="error" th:if="${#fields.hasErrors('fechaPedido')}" th:errors="*{fechaPedido}"></div>
    </div>

    <div class="campo">
      <label for="totalPedido">Total</label>
      <input type="number" id="totalPedido" th:field="*{totalPedido}">
      <div class="error" th:if="${#fields.hasErrors('totalPedido')}" th:errors="*{totalPedido}"></div>
    </div>

    <div class="campo">
      <label for="idUsuario">id usuario</label>
      <input type="number" id="idUsuario" th:field="*{idUsuario}">
      <div class="error" th:if="${#fields.hasErrors('idUsuario')}" th:errors="*{idUsuario}"></div>
    </div>

    <div class="acciones">
      <button type="submit" class="btn btn-guardar"
              th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>

      <a th:href="@{/pedidos}" class="btn btn-volver">Volver</a>
    </div>
  </form>
</div>

</body>
</html>
