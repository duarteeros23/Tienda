<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${modoEdicion} ? 'Editar Producto' : 'Nuevo Producto'"></title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #f4f4f4; }
    .container { width: 100%; max-width: 500px; text-align: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 20px; color: #333; }
    .campo { margin-bottom: 15px; text-align: left; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .error { color: red; font-size: 13px; margin-top: 4px; }
    .acciones { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
    .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block; }
    .btn-guardar { background-color: #01415B; color: white; }
    .btn-volver { background-color: #6c757d; color: white; }
    .btn-eliminar { background-color: #dc3545; color: white; }
  </style>
</head>
<body>

<div class="container">
  <h1 th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></h1>

  <form th:action="${modoEdicion} ? @{/productos/actualizar/{id}(id=${producto.idProducto})} : @{/productos/guardar}"
        th:object="${producto}"
        method="post">

    <input type="hidden" th:field="*{idProducto}" th:if="${modoEdicion}">



    <div class="campo">
      <label for="nombreProducto">Nombre</label>
      <input type="text" id="nombreProducto" th:field="*{nombreProducto}">
      <div class="error" th:if="${#fields.hasErrors('nombreProducto')}" th:errors="*{nombreProducto}"></div>
    </div>

    <div class="campo">
      <label for="precioProducto">precio</label>
      <input type="number" id="precioProducto" th:field="*{precioProducto}">
      <div class="error" th:if="${#fields.hasErrors('precioProducto')}" th:errors="*{precioProducto}"></div>
    </div>

    <div class="campo">
      <label for="stockk">stock</label>
      <input type="number" id="stockk" th:field="*{stockk}">
      <div class="error" th:if="${#fields.hasErrors('stockk')}" th:errors="*{stockk}"></div>
    </div>

    <div class="campo">
      <label for="idCategoria">id Categoria</label>
      <input type="number" id="idCategoria" th:field="*{idCategoria}">
      <div class="error" th:if="${#fields.hasErrors('idCategoria')}" th:errors="*{idCategoria}"></div>
    </div>

    <div class="acciones">
      <button type="submit" class="btn btn-guardar"
              th:text="${modoEdicion} ? 'Actualizar' : 'Guardar'"></button>

      <a th:href="@{/productos}" class="btn btn-volver">Volver</a>
    </div>
  </form>
</div>

</body>
</html>
